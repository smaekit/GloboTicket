name: Deploy to AKS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Kubernetes Manifests
    runs-on: ubuntu-latest

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.4"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="client_id=$ARM_CLIENT_ID" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID"

      - name: Read Terraform Outputs
        id: tf
        run: |
          echo "resource_group=$(terraform output -raw resource_group_name)"           >> "$GITHUB_OUTPUT"
          echo "aks_cluster=$(terraform output -raw aks_cluster_name)"                 >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)"            >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(terraform output -raw key_vault_name)"                >> "$GITHUB_OUTPUT"
          echo "kv_provider_client_id=$(terraform output -raw key_vault_secret_provider_client_id)" >> "$GITHUB_OUTPUT"

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ steps.tf.outputs.resource_group }} \
            --name ${{ steps.tf.outputs.aks_cluster }} \
            --overwrite-existing

      - name: Template SecretProviderClass
        working-directory: ${{ github.workspace }}
        run: |
          TENANT_ID=$(az account show --query tenantId -o tsv)
          sed \
            -e "s|__KV_PROVIDER_CLIENT_ID__|${{ steps.tf.outputs.kv_provider_client_id }}|g" \
            -e "s|__KEY_VAULT_NAME__|${{ steps.tf.outputs.key_vault_name }}|g" \
            -e "s|__TENANT_ID__|${TENANT_ID}|g" \
            k8s/secretproviderclass.yaml > k8s/secretproviderclass.rendered.yaml

      - name: Template Applications
        working-directory: ${{ github.workspace }}
        run: |
          sed \
            -e "s|__ACR_LOGIN_SERVER__|${{ steps.tf.outputs.acr_login_server }}|g" \
            k8s/applications.yaml > k8s/applications.rendered.yaml

      - name: Apply Namespace
        working-directory: ${{ github.workspace }}
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply SecretProviderClass
        working-directory: ${{ github.workspace }}
        run: kubectl apply -f k8s/secretproviderclass.rendered.yaml

      - name: Apply Applications
        working-directory: ${{ github.workspace }}
        run: kubectl apply -f k8s/applications.rendered.yaml

      - name: Show Services
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Waiting for deployments ==="
          kubectl rollout status deployment -n globoticket --timeout=120s || true
          echo ""
          echo "=== Services ==="
          kubectl get svc -n globoticket
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n globoticket
